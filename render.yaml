services:
  - type: web
    name: philix-finance-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate --schema=./prisma/schema.prod.prisma
    startCommand: sh start.sh
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: philix-finance-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://philix-finance.vercel.app
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_FROM
        value: "Philix Finance <noreply@philixfinance.com>"

databases:
  - name: philix-finance-db
    databaseName: philix_finance
    user: philix
    plan: free
