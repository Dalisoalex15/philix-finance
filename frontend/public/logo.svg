<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <clipPath id="circ2">
      <circle cx="40" cy="40" r="38"/>
    </clipPath>
    <radialGradient id="og2" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FBBC3B"/>
      <stop offset="100%" stop-color="#E8940A"/>
    </radialGradient>
    <radialGradient id="sg2" cx="60%" cy="70%" r="70%">
      <stop offset="0%" stop-color="#D8DCDF"/>
      <stop offset="100%" stop-color="#9BA3AB"/>
    </radialGradient>
  </defs>

  <!-- White base circle -->
  <circle cx="40" cy="40" r="39" fill="white"/>

  <g clip-path="url(#circ2)">
    <!-- Orange wave — upper shape -->
    <path d="M2 2 L78 2 L78 46 C68 38 58 30 46 32 C34 34 26 44 18 50 C12 54 6 54 2 52 Z"
          fill="url(#og2)"/>
    <!-- Silver/gray wave — lower shape -->
    <path d="M2 52 C6 54 12 54 18 50 C26 44 34 34 46 32 C58 30 68 38 78 46 L78 78 L2 78 Z"
          fill="url(#sg2)"/>
  </g>

  <!-- Subtle border -->
  <circle cx="40" cy="40" r="38" stroke="#e0e0e0" stroke-width="1" fill="none"/>

  <!-- Wordmark: "Philix Finance" bold dark -->
  <text x="92" y="48"
        font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
        font-weight="800"
        font-size="30"
        fill="#0B1F3A"
        letter-spacing="-0.5">Philix Finance</text>
</svg>
